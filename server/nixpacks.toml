[phases.setup]
# nodejs_22 must be listed explicitly — specifying nixPkgs replaces nixpacks'
# auto-detected Node.js packages rather than extending them.
# System libs required by playwright's own Chromium (downloaded via postinstall).
# We do NOT install the nix chromium package — playwright downloads a version
# that is guaranteed compatible with its CDP protocol implementation.
nixPkgs = [
  "nodejs_22",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "xorg.libX11",
  "xorg.libxcb",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libXrender",
  "mesa",
  "expat",
  "libdrm",
  "libxkbcommon",
  "gtk3",
  "pango",
  "cairo",
  "glib",
  "cups",
  "alsa-lib",
]
