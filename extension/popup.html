<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{ --accent:#1C7A50; --ink:#142019; --muted:#5a6b61; --line:#D6DED7; }
    body{ width:260px; margin:0; font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; color:var(--ink); }
    header{ background:var(--accent); color:#fff; padding:12px 14px; font-weight:700; letter-spacing:.02em; }
    .body{ padding:12px 14px; }
    .row{ display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line); }
    .row:last-child{ border-bottom:none; }
    .store{ font-weight:600; }
    .pill{ font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }
    .on{ background:#E6F1EA; color:var(--accent); }
    .off{ background:#f1eee9; color:var(--muted); }
    .connect{ font-size:12px; color:var(--accent); cursor:pointer; background:none; border:none; text-decoration:underline; }
    a.site{ display:block; margin-top:12px; text-align:center; background:var(--accent); color:#fff; text-decoration:none; padding:9px; border-radius:8px; font-weight:600; }
  </style>
</head>
<body>
  <header>Comparoz</header>
  <div class="body" id="stores">טוען…</div>
  <script src="popup.js"></script>
</body>
</html>
