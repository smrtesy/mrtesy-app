<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1F3D" />
    <title>smrtesy — אופליין</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
        background: #0F1F3D;
        color: #FAFAF7;
        font-family: "Heebo", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        -webkit-tap-highlight-color: transparent;
      }
      .bulb { width: 88px; height: 88px; }
      h1 { font-size: 22px; font-weight: 700; margin: 0; }
      p { font-size: 15px; line-height: 1.6; color: #C7CBD4; margin: 0; max-width: 30ch; }
      button {
        margin-top: 8px;
        padding: 12px 28px;
        font: inherit;
        font-weight: 600;
        color: #0F1F3D;
        background: #C9A646;
        border: 0;
        border-radius: 12px;
        cursor: pointer;
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <svg class="bulb" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M 32 8 C 21 8, 14 16, 14 26 C 14 32, 17 37, 21 41 L 21 46 L 43 46 L 43 41 C 47 37, 50 32, 50 26 C 50 16, 43 8, 32 8 Z" fill="#C9A646"/>
      <rect x="23" y="47" width="18" height="3" rx="0.8" fill="#C9A646"/>
      <rect x="24" y="51" width="16" height="3" rx="0.8" fill="#C9A646"/>
      <path d="M 27 55 L 37 55 L 35 58 L 29 58 Z" fill="#C9A646"/>
    </svg>
    <h1>אין חיבור לאינטרנט</h1>
    <p>נראה שאתה כרגע לא מחובר. בדוק את החיבור ונסה שוב.</p>
    <button onclick="location.reload()">נסה שוב</button>
    <script>
      // Auto-retry the moment connectivity returns.
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
