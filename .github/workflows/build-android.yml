name: Build Android APK

on:
  push:
    branches: [main, "claude/*"]
    paths:
      - "android-app/**"
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android-app/app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew
        working-directory: .

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android-app

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smrtesy-debug-${{ github.run_number }}
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
